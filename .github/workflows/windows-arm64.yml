name: Windows ARM64

on:
  push:
    branches:
      - '**'
      - '!master'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows ARM64 installer
    runs-on: windows-11-arm
    timeout-minutes: 90

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git safe directory
        shell: cmd
        run: git config --global --add safe.directory *

      - name: Set up MSYS2 CLANGARM64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true

      - name: Install dependencies
        run: packaging/MSWindows/SETUP_arm64.sh

      - name: Install verpatch (x86 binary, runs under ARM64 emulation)
        run: |
          curl -sL https://api.nuget.org/v3-flatcontainer/verpatch/1.0.14/verpatch.1.0.14.nupkg -o verpatch.nupkg
          python -c "import zipfile; zipfile.ZipFile('verpatch.nupkg').extract('lib/win/verpatch.exe', '.')"
          cp lib/win/verpatch.exe "$MINGW_PREFIX/bin/"
          rm -rf lib/win verpatch.nupkg

      - name: Build
        env:
          PYTHONUNBUFFERED: "1"
        run: >-
          python packaging/MSWindows/BUILD.py
          --no-light --no-sign --no-sbom --no-msi --no-run
          --no-cuda --no-printing
          --no-html5 --no-manual
          --no-putty --no-openssh --no-openssl --no-paexec --no-desktop-logon

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: Xpra-arm64-zip
          path: Xpra*.zip
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Xpra-arm64-installer
          path: Xpra*Setup*.exe
          if-no-files-found: error
